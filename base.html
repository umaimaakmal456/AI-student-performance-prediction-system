<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased flex min-h-screen">

    {% if session.get("logged_in") %}
    <!-- Sidebar for Logged in Users -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl hidden md:flex">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-tight text-blue-400">Academic<br>Assistant</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="{{ url_for('main.dashboard') }}" class="block px-4 py-3 rounded-lg font-medium {% if request.endpoint == 'main.dashboard' %}bg-blue-600 shadow{% else %}hover:bg-slate-800 transition{% endif %}">Dashboard</a>
            <a href="{{ url_for('main.predict') }}" class="block px-4 py-3 rounded-lg font-medium {% if request.endpoint == 'main.predict' %}bg-blue-600 shadow{% else %}hover:bg-slate-800 transition{% endif %}">New Prediction</a>
            <a href="{{ url_for('main.about') }}" class="block px-4 py-3 rounded-lg font-medium {% if request.endpoint == 'main.about' %}bg-blue-600 shadow{% else %}hover:bg-slate-800 transition{% endif %}">About</a>
        </nav>
        <div class="p-4">
            <a href="{{ url_for('main.logout') }}" class="block text-center px-4 py-2 border border-slate-700 hover:bg-slate-800 rounded text-sm text-gray-300">Logout</a>
        </div>
    </aside>
    {% endif %}

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
        {% if not session.get("logged_in") %}
        <!-- Top Navbar for Logged out users -->
        <header class="bg-white shadow-sm border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="font-bold text-xl text-blue-900">Academic Assistant</div>
                <nav class="space-x-4 flex items-center">
                    <a href="{{ url_for('main.home') }}" class="text-slate-600 hover:text-blue-600 font-medium text-sm">Home</a>
                    <a href="{{ url_for('main.about') }}" class="text-slate-600 hover:text-blue-600 font-medium text-sm">About</a>
                    <a href="{{ url_for('main.register') }}" class="text-slate-600 hover:text-blue-600 font-medium text-sm border border-slate-300 px-4 py-2 rounded transition">Sign Up</a>
                    <a href="{{ url_for('main.login') }}" class="bg-blue-900 text-white px-4 py-2 rounded shadow-sm hover:bg-blue-800 text-sm font-medium transition">Login</a>
                </nav>
            </div>
        </header>
        {% endif %}
        
        <main class="flex-1 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
