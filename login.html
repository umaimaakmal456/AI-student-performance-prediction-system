{% extends "base.html" %}
{% block content %}
<div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 mt-10">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-slate-100">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">Sign in</h2>
            <p class="mt-2 text-center text-sm text-slate-500">
                Don't have an account?
                <a href="{{ url_for('main.register') }}" class="font-medium text-blue-600 hover:text-blue-500">Register here</a>
            </p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            {% if error %}
                <div class="bg-red-50 text-red-600 p-3 rounded-md text-sm font-medium border border-red-100">{{ error }}</div>
            {% endif %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email address</label>
                    <input id="email" name="email" type="email" required class="appearance-none block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required class="appearance-none block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="••••••••">
                </div>
            </div>
            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-sm transition">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
